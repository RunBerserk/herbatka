<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Herbatka Fleet UI Draft</title>
  <desc id="desc">High-level wireframe showing map-first layout with telemetry and process controls.</desc>
  <style>
    .bg { fill: #0f172a; }
    .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
    .panel-light { fill: #1f2937; stroke: #475569; stroke-width: 2; rx: 10; ry: 10; }
    .title { fill: #e5e7eb; font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; }
    .label { fill: #d1d5db; font-family: Arial, sans-serif; font-size: 16px; font-weight: 600; }
    .text { fill: #9ca3af; font-family: Arial, sans-serif; font-size: 14px; }
    .accent { fill: #22d3ee; font-family: Arial, sans-serif; font-size: 13px; font-weight: 600; }
    .marker { fill: #38bdf8; stroke: #0ea5e9; stroke-width: 2; }
    .line { stroke: #334155; stroke-width: 2; }
  </style>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>

  <rect class="panel" x="24" y="20" width="1352" height="70"/>
  <text class="title" x="48" y="64">Herbatka Fleet Console - UI Draft</text>
  <text class="accent" x="840" y="64">Connection | Env | Theme | Status</text>

  <rect class="panel" x="24" y="110" width="900" height="560"/>
  <text class="label" x="44" y="144">Map Pane</text>
  <rect class="panel-light" x="44" y="160" width="860" height="470"/>
  <text class="text" x="64" y="188">Vehicle Map (lat/lon markers, zoom, fit fleet, follow vehicle)</text>

  <circle class="marker" cx="240" cy="290" r="9"/>
  <circle class="marker" cx="410" cy="370" r="9"/>
  <circle class="marker" cx="620" cy="260" r="9"/>
  <circle class="marker" cx="760" cy="440" r="9"/>
  <line class="line" x1="240" y1="290" x2="410" y2="370"/>
  <line class="line" x1="410" y1="370" x2="620" y2="260"/>
  <line class="line" x1="620" y1="260" x2="760" y2="440"/>

  <rect class="panel-light" x="44" y="640" width="860" height="24"/>
  <text class="text" x="64" y="657">Map Controls: Zoom +/- | Fit Fleet | Follow Selected Vehicle</text>

  <rect class="panel" x="944" y="110" width="432" height="560"/>
  <text class="label" x="964" y="144">Telemetry and Controls</text>

  <rect class="panel-light" x="964" y="160" width="392" height="115"/>
  <text class="label" x="984" y="188">Selected Vehicle</text>
  <text class="text" x="984" y="212">id, lat, lon, speed, heading, updated_at</text>
  <text class="text" x="984" y="236">distance, battery, signal</text>

  <rect class="panel-light" x="964" y="290" width="392" height="95"/>
  <text class="label" x="984" y="318">Fleet Stats</text>
  <text class="text" x="984" y="342">online, stale, avg speed, topic lag</text>

  <rect class="panel-light" x="964" y="400" width="392" height="110"/>
  <text class="label" x="984" y="428">Broker Controls</text>
  <text class="text" x="984" y="452">Start Broker | Stop Broker | Restart Broker</text>

  <rect class="panel-light" x="964" y="525" width="392" height="125"/>
  <text class="label" x="984" y="553">Simulation Controls</text>
  <text class="text" x="984" y="577">Start Simulator | Pause | Stop | Scenario</text>
  <text class="text" x="984" y="601">Rate, seed, target fleet size</text>

  <rect class="panel" x="24" y="690" width="666" height="190"/>
  <text class="label" x="44" y="724">Event and Command Log</text>
  <text class="text" x="44" y="752">UI actions, command results, warnings, recoveries</text>

  <rect class="panel" x="710" y="690" width="666" height="190"/>
  <text class="label" x="730" y="724">Broker and Simulator Output</text>
  <text class="text" x="730" y="752">stdout/stderr stream with filtering and auto-scroll</text>
</svg>
