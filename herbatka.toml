data_dir = "data/logs"
segment_max_bytes = 1048576
# Set to an integer byte limit to enable retention (default for all topics).
# max_topic_bytes = 10485760
# Optional per-topic caps by exact topic name (overrides max_topic_bytes for that topic only).
# Quote keys when the topic contains dots, e.g. "fleet1.control".
# [per_topic_max_bytes]
# "fleet1.control" = 1048576
# "fleet1.telemetry" = 104857600
fsync_policy = "always"
listen_addr = "127.0.0.1:7000"
